{% load static %}
<!-- ══ VISTA COMPLETA: CONFIGURACIÓN MAESTRO DE SEDE ══════════════════════════════ -->
<div class="sede-config-full-view" id="sedeConfigFullView" style="display:none;">
    
    <!-- Navegador de Sede -->
    <div class="sede-breadcrumb-nav">
        <div class="sede-breadcrumb-left">
            <button class="sede-breadcrumb-back" id="sedeBreadcrumbBack" aria-label="Volver">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div class="sede-breadcrumb-info">
                <div class="sede-breadcrumb-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M3 21h18M5 21V7l8-4 8 4v14M8 21v-9a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v9"/></svg>
                </div>
                <div class="sede-breadcrumb-content">
                    <div class="sede-breadcrumb-title" id="sedeBreadcrumbTitle">Gestión Sede</div>
                    <div class="sede-breadcrumb-subtitle" id="sedeBreadcrumbSubtitle">Sede Activa: --</div>
                </div>
            </div>
        </div>
        
        <!-- Pestañas de navegación (horizontal en pantallas grandes) -->
        <div class="sede-breadcrumb-tabs">
            <button class="sede-breadcrumb-tab active" data-tab="datos">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                Datos
            </button>
            <button class="sede-breadcrumb-tab" data-tab="rucs">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M3 21h18M5 21V7l8-4 8 4v14M8 21v-9a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v9"/></svg>
                RUCs
            </button>
            <button class="sede-breadcrumb-tab" data-tab="cajas">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M12 2v5"/><path d="M12 17v5"/><path d="M2 12h5"/><path d="M17 12h5"/></svg>
                Cajas
            </button>
            <button class="sede-breadcrumb-tab" data-tab="planes">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                Planes
            </button>
            <button class="sede-breadcrumb-tab" data-tab="personal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Personal
            </button>
            <button class="sede-breadcrumb-tab" data-tab="habilidades">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Habilidades
            </button>
            <button class="sede-breadcrumb-tab" data-tab="materiales">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                Materiales
            </button>
            <button class="sede-breadcrumb-tab" data-tab="tickets">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                Tickets
            </button>
        </div>
    </div>
    
    <!-- Contenido principal de la configuración -->
    <div class="sede-config-content-wrapper">
        <div class="sede-config-body" id="sedeConfigBody">
            <div class="sede-loading-spinner">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                <span>Cargando datos detallados de la sede...</span>
            </div>
        </div>
    </div>
</div>
